name: 🚀 WaysHub Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: wayshub-backend
  IMAGE_TAG: latest

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests
      - name: Run tests
        run: npm test

      # ❗ Kalau test gagal → step bawah gak jalan

      # 5. Login DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # 7. Deploy ke server via SSH
      - name: Deploy to Server (Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/dumbways-app

            # Pull image terbaru dari DockerHub
            docker compose pull
            # Stop dan hapus container lama
            docker compose down
            # Recreate container dengan image terbaru
            docker compose up -d --build            